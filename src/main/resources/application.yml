server:
  tomcat:
    accept-count: 1000
    connection-timeout: 20000

spring:
  application:
    name: concurrency-control-poc
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:13306/concurrency_db}
    username: ${SPRING_DATASOURCE_USERNAME:app_user}
    password: ${SPRING_DATASOURCE_PASSWORD:app_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 50
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:16379}
      lettuce:
        pool:
          max-active: 50
          max-idle: 50
          min-idle: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.concurrency.poc: DEBUG
    org.springframework.web: DEBUG
    org.apache.coyote: DEBUG
    org.hibernate.SQL: INFO
