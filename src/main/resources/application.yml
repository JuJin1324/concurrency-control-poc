server:
  tomcat:
    threads:
      max: 500
      min-spare: 50
    accept-count: 1000
    connection-timeout: 20000

spring:
  application:
    name: concurrency-control-poc
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:13306/concurrency_db}
    username: ${SPRING_DATASOURCE_USERNAME:app_user}
    password: ${SPRING_DATASOURCE_PASSWORD:app_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:16379}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true