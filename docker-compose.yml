version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: concurrency-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: concurrency_poc
      MYSQL_USER: poc_user
      MYSQL_PASSWORD: poc_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - poc-network

  redis:
    image: redis:7.0-alpine
    container_name: concurrency-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - poc-network

volumes:
  mysql_data:
  redis_data:

networks:
  poc-network:
    driver: bridge
